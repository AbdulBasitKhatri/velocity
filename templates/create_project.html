{% extends "base.html" %}

{% block title %}Create Project{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4 bg-[#070312]">
    
    <!-- Background glow effect -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-purple-600/10 blur-[100px] pointer-events-none"></div>

    <div class="relative w-full max-w-md bg-purple-500/5 border border-purple-500/10 p-6 md:p-8 rounded-[2.5rem] shadow-2xl backdrop-blur-md">
        
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-purple-100 mb-1 tracking-tight">
                New Project
            </h1>
            <p class="text-purple-300/60 text-sm">
                Set up your workspace to get started.
            </p>
        </div>

        <form method="POST" class="space-y-5">

            <!-- Project Name -->
            <div class="space-y-1.5">
                <label class="flex items-center gap-2 text-xs font-semibold text-purple-200 ml-1">
                    <i data-feather="tag" class="w-3.5 h-3.5 text-purple-400"></i>
                    PROJECT NAME
                </label>
                <input
                    type="text"
                    name="name"
                    required
                    placeholder="e.g. App Redesign"
                    class="w-full bg-purple-500/5 border border-purple-500/20 rounded-xl px-4 py-2.5 text-sm text-purple-100 placeholder:text-purple-300/30 focus:ring-2 focus:ring-purple-500/40 focus:border-purple-500/50 outline-none transition-all"
                >
            </div>

            <!-- Description -->
            <div class="space-y-1.5">
                <label class="flex items-center gap-2 text-xs font-semibold text-purple-200 ml-1">
                    <i data-feather="align-left" class="w-3.5 h-3.5 text-purple-400"></i>
                    DESCRIPTION
                </label>
                <textarea
                    name="description"
                    rows="3"
                    placeholder="What's this project about?"
                    class="w-full bg-purple-500/5 border border-purple-500/20 rounded-xl px-4 py-2.5 text-sm text-purple-100 placeholder:text-purple-300/30 focus:ring-2 focus:ring-purple-500/40 focus:border-purple-500/50 outline-none transition-all resize-none"
                ></textarea>
            </div>

            <!-- Footer Actions -->
            <div class="flex flex-col gap-4 pt-2">
                <button
                    type="submit"
                    class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-purple-500 to-fuchsia-500 hover:opacity-90 py-3 rounded-xl font-bold text-white text-sm shadow-lg shadow-purple-500/20 transition-all active:scale-95"
                >
                    <i data-feather="plus-circle" class="w-6 h-6"></i>
                    <span>Create Project</span>
                </button>

                <a href="#" onclick="window.history.back()"
                   class="flex items-center justify-center gap-2 text-purple-400/60 hover:text-purple-200 transition-colors text-xs font-medium">
                    <i data-feather="arrow-left" class="w-3.5 h-3.5"></i>
                    Cancel and go back
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
