<!-- MOBILE TOPBAR -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-slate-900 border-b border-purple-500/20 px-4 py-3 flex items-center justify-between">

        <h1 class="text-xl font-bold text-purple-400">
            Velocity
        </h1>

        <button
            onclick="toggleSidebar()"
            class="text-purple-300 hover:text-white text-2xl leading-none"
        >
            ☰
        </button>

    </div>

    <!-- MOBILE OVERLAY -->
    <div
        id="sidebarOverlay"
        onclick="closeSidebar()"
        class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"
    ></div>

    <!-- SIDEBAR -->
    <aside
        id="sidebar"
        class="
            fixed md:static
            top-0 left-[-300px] md:left-0
            z-50 md:z-auto
            h-screen md:h-auto
            w-64
            bg-slate-900
            border-r border-purple-500/20
            p-6
            flex flex-col
            transition-all duration-300
        "
    >

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-10">

            <h1 class="text-3xl font-bold text-purple-400">
                Velocity
            </h1>

            <!-- MOBILE CLOSE -->
            <button
                onclick="closeSidebar()"
                class="md:hidden text-purple-300 text-2xl"
            >
                x
            </button>

        </div>

        <!-- NAV -->
        <nav class="space-y-3 flex-1">

            <a href="/dashboard"
            class="block px-4 py-3 rounded-xl transition
            {% if request.path == '/dashboard' %}
                    bg-purple-600/20 border border-purple-500/20
            {% else %}
                    hover:bg-slate-800
            {% endif %}
            ">
                Dashboard
            </a>

            <a href="/projects"
            class="block px-4 py-3 rounded-xl transition
            {% if request.path == '/projects' %}
                    bg-purple-600/20 border border-purple-500/20
            {% else %}
                    hover:bg-slate-800
            {% endif %}
            ">
                My Projects
            </a>

            <a href="/tasks"
            class="block px-4 py-3 rounded-xl transition
            {% if request.path == '/tasks' %}
                    bg-purple-600/20 border border-purple-500/20
            {% else %}
                    hover:bg-slate-800
            {% endif %}
            ">
                My Tasks
            </a>

        </nav>

        <!-- FOOTER -->
        <div class="pt-6 border-t border-purple-500/20">

            <a href="/logout"
            class="block text-center bg-red-500/20 hover:bg-red-500/30 text-red-300 py-3 rounded-xl transition">
                Logout
            </a>

        </div>

    </aside>
